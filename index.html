<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Seen — Brazil Wildlife</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="header">
    <div class="app-title">Wildlife Tracker</div>
    <div class="tabs">
      <div class="tab active" data-tab="search">Search</div>
      <div class="tab" data-tab="seen">Seen</div>
    </div>
  </div>

  <!-- Search view -->
  <div id="search-view">
    <div class="filters" id="category-filters"></div>
    <div class="list-container" id="animal-list"></div>
  </div>

  <!-- Seen view -->
  <div id="seen-view" hidden>
    <div class="stats-container">
      <div class="stats-number" id="seen-count">0</div>
      <div class="stats-text">Animals Seen in Brazil</div>
    </div>
    <div class="list-container" id="seen-list"></div>
  </div>

  <!-- Detail modal -->
  <div class="modal" id="detail-modal" aria-modal="true" role="dialog" aria-hidden="true">
    <div class="modal-header-img" id="modal-img">
      <button class="close-btn" id="close-modal-btn" aria-label="Close">✕</button>
    </div>
    <div class="modal-content">
      <div class="modal-title" id="modal-name"></div>
      <div class="modal-scientific" id="modal-scientific"></div>

      <div class="action-bar">
        <button class="btn-seen" id="modal-seen-btn">Mark as Seen</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Weight</div>
          <div class="stat-value" id="modal-weight">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Length</div>
          <div class="stat-value" id="modal-length">—</div>
        </div>
      </div>

      <div class="stat-label">Description</div>
      <div class="description" id="modal-desc"></div>

      <div class="stat-label">Regions</div>
      <div class="description" id="modal-regions" style="font-weight:600;"></div>
    </div>
  </div>

  <!-- Load data first, then app logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
